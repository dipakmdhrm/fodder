name: release
# Bot-published releases (release-please with GITHUB_TOKEN) do not emit a
# `release` event that triggers workflows, so release-please.yml CALLS this
# workflow directly. The dispatch trigger allows manual re-runs for a tag;
# the release trigger still covers manually-published releases.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build and upload assets for (e.g. v0.1.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

jobs:
  deb:
    name: release-deb
    runs-on: ubuntu-24.04
    container: ubuntu:24.04
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y curl jq ca-certificates git build-essential pkg-config \
            libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev libdbus-1-dev
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.event.release.tag_name }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deb --locked
      - run: cargo build --release --workspace
      - run: cargo deb -p fodder-gtk --no-build
      - name: Smoke install
        run: |
          apt-get install -y ./target/debian/fodder_*.deb
          fodder --version && fodder-daemon --version
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .github/upload-release-assets.sh target/debian/*.deb

  rpm:
    name: release-rpm
    runs-on: ubuntu-24.04
    container: fedora:latest
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y gcc git curl jq gtk4-devel libadwaita-devel webkitgtk6.0-devel \
            dbus-devel rust cargo
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.event.release.tag_name }}
      - run: cargo install cargo-generate-rpm --locked
      - run: cargo build --release --workspace
      - run: ~/.cargo/bin/cargo-generate-rpm -p crates/fodder-gtk
      - name: Smoke install
        run: |
          dnf install -y ./target/generate-rpm/fodder-*.rpm
          fodder --version && fodder-daemon --version
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .github/upload-release-assets.sh target/generate-rpm/*.rpm

  arch:
    name: release-arch
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    steps:
      - name: Install system dependencies
        run: pacman -Syu --noconfirm git curl jq rust dbus gtk4 libadwaita webkitgtk-6.0
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.event.release.tag_name }}
      - name: Build package
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/arch/PKGBUILD
          git archive --format=tar.gz --prefix="fodder-$VERSION/" \
            -o "packaging/arch/fodder-$VERSION.tar.gz" HEAD
          useradd -m builder
          chown -R builder packaging/arch
          su builder -c "cd '$GITHUB_WORKSPACE/packaging/arch' && makepkg -f --noconfirm"
      - name: Smoke install
        run: |
          pacman -U --noconfirm packaging/arch/fodder-*.pkg.tar.zst
          fodder --version && fodder-daemon --version
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .github/upload-release-assets.sh packaging/arch/*.pkg.tar.zst
